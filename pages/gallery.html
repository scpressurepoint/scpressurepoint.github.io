<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gallery — SC Pressure Point</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/elderly-friendly.css">
</head>
<body>
  <header style="padding:18px 24px; border-bottom:1px solid #eee;">
    <a href="/" style="font-weight:800; color:#0f2f57; text-decoration:none;">SC Pressure Point</a>
    <a href="/" style="float:right;">Home</a>
  </header>

  <main style="max-width:1100px; margin:36px auto; padding:0 18px;">
    <h1 style="font-size:1.6rem; margin-bottom:18px;">Gallery</h1>
    <p style="color:#475569; margin-bottom:20px;">Click an image to enlarge.</p>

    <div class="wwa-ctas" style="align-items:stretch;">
      <img src="/assets/images/BeforeandAfterSiding.png" alt="Before and After Siding" onclick="openModal(this.src, this.alt)" class="wwa-gallery-img">
      <img src="/assets/images/Trailer.JPG" alt="Trailer" onclick="openModal(this.src, this.alt)" class="wwa-gallery-img">
      <img src="/assets/images/ActionShot.JPG" alt="Action Shot" onclick="openModal(this.src, this.alt)" class="wwa-gallery-img">
      <!-- Add more images here as needed -->
    </div>

  </main>

  <footer style="padding:28px 18px; text-align:center; color:#64748b;">© SC Pressure Point</footer>

  <script src="/assets/js/main.js"></script>
